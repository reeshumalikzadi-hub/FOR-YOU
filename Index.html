<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Favorite Person ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffb6c1,#ffd6e8,#fff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.card{
    width:90%;
    max-width:400px;
    background:white;
    border-radius:25px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    color:#ff4f8b;
}

p{
    color:#555;
    font-size:18px;
}

button{
    border:none;
    padding:14px 28px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    margin:10px;
    transition:.3s;
}

.yes{
    background:#ff4f8b;
    color:white;
}

.no{
    background:#ddd;
}

button:hover{
    transform:scale(1.08);
}

#result{
    display:none;
    animation:fade 1s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>

</head>

<body>

<div class="card" id="page1">
<h1>🔒 Unlock My Heart</h1>

<p>Only one person can unlock this heart... ❤️</p>

<button class="yes" onclick="nextPage()">Unlock ❤️</button>
</div>

<div class="card" id="result">

<h1>🥹❤️</h1>

<p>
You are my favorite notification.<br><br>

You make every day brighter.<br><br>

Thank you for being my safe place. 🌸
</p>

<h2>Will you stay with me forever? 💍</h2>

<button class="yes" onclick="love()">Forever ❤️</button>

<button class="yes" onclick="love()">Always 🥹</button>

</div>

<script>

function nextPage(){
document.getElementById("page1").style.display="none";
document.getElementById("result").style.display="block";
}

function love(){
document.body.innerHTML=
"<div style='display:flex;justify-content:center;align-items:center;height:100vh;background:#ff4f8b;color:white;font-family:Arial;text-align:center;padding:20px;'><div><h1>💖 I Knew It! 💖</h1><h2>You're My Forever Person 🥹❤️</h2><h3>I Love You Endless ♾️</h3></div></div>";
}

</script>

</body>
</html>
